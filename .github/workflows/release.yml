name: Release

on:
  release:
    types: [published]

jobs:
  build-jar:
    uses: ./.github/workflows/build-jar.yml

  build-firmware:
    uses: ./.github/workflows/build-firmware.yml
    with:
      version: ${{ github.event.release.tag_name }}

  upload-assets:
    needs: [build-jar, build-firmware]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: server-jar
          path: artifacts

      - name: Download firmware binary
        uses: actions/download-artifact@v4
        with:
          name: firmware-bin
          path: artifacts

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
