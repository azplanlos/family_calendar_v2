# "org" ensures this Service is used with the correct Serverless Framework Access Key.
org: azprivate
# "app" enables Serverless Framework Dashboard features and sharing them with other Services.
app: familienkalender
service: createimage

provider:
  name: aws
  runtime: java25
  region: eu-central-1
  timeout: 10
  memorySize: 1024
  logRetentionInDays: 7
  iam:
    role:
      statements:
        - Effect: 'Allow'
          Action:
            - 's3:*'
          Resource:
            - 'arn:aws:s3:::familienkalender/*'

package:
  artifact: target/Familienkalender-Server.jar

custom:
  updateIntervalMinutes: 360

functions:
  FamilyWall-Kalender:
    handler: de.goForFun.familienkalender.CreateKalenderImage
    events:
      - eventBridge:
          schedule: rate(${self:custom.updateIntervalMinutes} minutes)
    environment:
      THUMBNAIL_SIZE: 100
      FONTCONFIG_CACHE: /tmp/.cache/fontconfig
      FONTCONFIG_PATH: /tmp/fontconfig
      CALENDAR_FEED: ${param:calendarFeed}
      SCHOOL_CALENDAR_FEED: ${param:schoolCalendarFeed, ''}
      VACATION_CALENDAR_FEED: ${param:vacationCalendarFeed, 'https://www.feiertage-deutschland.de/kalender-download/ics/schulferien-bayern.ics'}
      HOLIDAY_COUNTRY: ${param:holidayCountry, 'de'}
      HOLIDAY_STATE: ${param:holidayState, 'by'}

  ServeCalendarImage:
    handler: de.goForFun.familienkalender.ServeCalendarImage
    timeout: 30
    memorySize: 512
    url:
      authorizer: none
    environment:
      FONTCONFIG_CACHE: /tmp/.cache/fontconfig
      FONTCONFIG_PATH: /tmp/fontconfig
      API_SECRET: ${param:apiSecret}
      UPDATE_INTERVAL_MINUTES: ${self:custom.updateIntervalMinutes}