; PlatformIO Configuration for Family Calendar E-Ink Display
; Board: WeMos LOLIN S3 Pro (ESP32-S3)
; Display: 3-color e-ink 800x480

[env:lolin_s3_pro]
platform = espressif32
board = lolin_s3_pro
framework = arduino

; Serial monitor
monitor_speed = 115200

; Board config
board_build.arduino.memory_type = qio_opi
board_build.partitions = default_16MB.csv

; USB CDC for serial output
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; E-Paper Display Pin Definitions (matching CircuitPython code.py)
    -DEPD_MOSI=11
    -DEPD_SCLK=12
    -DEPD_CS=39
    -DEPD_DC=40
    -DEPD_RST=41
    -DEPD_BUSY=42

; Libraries
lib_deps =
    https://github.com/ZinggJM/GxEPD2.git
    adafruit/Adafruit GFX Library
